<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkShield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
    }
    .header {
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      padding: 20px;
      text-align: center;
    }
    .header img { width: 48px; height: 48px; margin-bottom: 8px; }
    .header h1 { font-size: 20px; color: #fff; font-weight: 700; }
    .header p { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 16px;
    }
    .stat {
      text-align: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px 8px;
    }
    .stat-num { font-size: 22px; font-weight: 700; color: #22d3ee; }
    .stat-label { font-size: 10px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .controls { padding: 0 16px 16px; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .toggle-row span { font-size: 13px; }
    .toggle {
      width: 44px; height: 24px;
      background: #333;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active { background: #06b6d4; }
    .toggle::after {
      content: '';
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(20px); }
    .footer {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: #555;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="LinkShield">
    <h1>LinkShield</h1>
    <p>Real-time link protection</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-scanned">0</div>
      <div class="stat-label">Scanned</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-warnings">0</div>
      <div class="stat-label">Warnings</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-blocked">0</div>
      <div class="stat-label">Blocked</div>
    </div>
  </div>
  <div class="controls">
    <div class="toggle-row">
      <span>🛡️ Protection Enabled</span>
      <div class="toggle active" id="toggle-enabled"></div>
    </div>
    <div class="toggle-row">
      <span>🚫 Block High-Risk Links</span>
      <div class="toggle" id="toggle-block"></div>
    </div>
  </div>
  <div class="footer">LinkShield v1.0 — Stay safe online</div>
  <script src="popup.js"></script>
</body>
</html>
